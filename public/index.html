<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NativePlanr — Ecological Habitat Designer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="app-container">
    
    <header class="botanical-header">
      <h1 class="site-title">NativePlanr</h1>
      <p class="site-tagline">Midwestern Prairie & Native Habitat Restoration Blueprint Engine</p>
    </header>

    <section class="form-container">
      <form id="garden-input-form" class="parameter-form">
        
        <div class="form-group">
          <label for="state">Target State</label>
          <select id="state" name="state" required>
            <option value="MI">Michigan</option>
            <option value="IL">Illinois</option>
            <option value="IN">Indiana</option>
            <option value="OH">Ohio</option>
            <option value="WI">Wisconsin</option>
            <option value="MN">Minnesota</option>
            <option value="IA">Iowa</option>
          </select>
        </div>

        <div class="form-group">
          <label for="county">County <span class="optional-label">(Optional)</span></label>
          <input type="text" id="county" name="county" placeholder="e.g., Washtenaw">
        </div>

        <div class="form-group">
          <label for="garden-type">What kind of native garden do you want to design?</label>
          <select id="garden-type" name="garden-type" required>
            <option value="pollinator">Butterfly & Pollinator Garden</option>
            <option value="woodland">Woodland Edge Garden</option>
            <option value="part-shade">Part Shade Flower Garden</option>
            <option value="rain-garden">Wet Soil / Rain Garden</option>
            <option value="meadow">Native Meadow Garden</option>
            <option value="low-maintenance">Low-Maintenance Native Garden</option>
            <option value="deer-resistant">Deer-Resistant Native Garden</option>
          </select>
        </div>

        <div class="form-group">
          <label for="pathway">Do you want a path through the garden?</label>
          <select id="pathway" name="pathway" required>
            <option value="none">No path through design</option>
            <option value="grass">Grass Path</option>
            <option value="woodchips">Woodchip Path</option>
            <option value="gravel">Gravel Path</option>
            <option value="pavers">Paver Path</option>
            <option value="dirt">Dirt Path</option>
          </select>
        </div>

        <div class="form-group">
          <label for="soil">What kind of soil are you working with?</label>
          <select id="soil" name="soil" required>
            <option value="rich-loam">Rich Loam</option>
            <option value="sandy">Sandy / Fast Draining</option>
            <option value="slight-clay">Slightly Clay</option>
            <option value="heavy-clay">Heavy Clay</option>
            <option value="wet-soggy">Wet / Soggy</option>
            <option value="swampy">Swampy / Standing Water</option>
          </select>
        </div>

        <div class="dimensions-row">
          <div class="form-group compact">
            <label for="width">Plot Width (ft)</label>
            <input type="number" id="width" name="width" value="12" min="4" max="40" required>
          </div>
          <div class="form-group compact">
            <label for="length">Plot Length (ft)</label>
            <input type="number" id="length" name="length" value="12" min="4" max="40" required>
          </div>
          <input type="hidden" id="density" name="density" value="0.5">
        </div>

        <div class="form-actions">
          <button type="submit" id="submit-btn" class="action-button">Design Your Garden Now</button>
        </div>
      </form>
    </section>

    <section class="canvas-viewport">
      <div class="canvas-container">
        
        <div id="render-target-canvas">
          <div class="canvas-placeholder-text">
            Configure site analysis metrics above and click "Design Your Garden Now" to construct your custom botanical blueprint map.
          </div>
        </div>

      </div>
    </section>

  </main>

<script src="render.js"></script>
<script src="app.js"></script>
</body>
</html>
