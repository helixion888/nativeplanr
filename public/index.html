<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NativePlanr // Native Habitat Blueprint Engine</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="app-workspace-container">
    
    <aside class="workspace-sidebar" id="app-control-sidebar">
      
      <div class="sidebar-branding">
        <h1>NativePlanr</h1>
        <p class="tagline">Ecosystem Design Engine</p>
      </div>

      <form id="matrix-intake-form" class="sidebar-form-group">
        
        <div class="form-element">
          <label for="state-selection">State Vector</label>
          <select id="state-selection" required>
            <option value="MI" selected>Michigan (MI)</option>
            <option value="OH">Ohio (OH)</option>
            <option value="IN">Indiana (IN)</option>
            <option value="IL">Illinois (IL)</option>
            <option value="WI">Wisconsin (WI)</option>
          </select>
        </div>

        <div class="form-element">
          <label for="county-input">County / Region</label>
          <input type="text" id="county-input" placeholder="e.g. Washtenaw" value="Washtenaw">
        </div>

        <div class="form-element">
          <label for="garden-type-selection">Habitat Eco-Theme</label>
          <select id="garden-type-selection" required>
            <option value="pollinator" selected>Butterfly & Pollinator Garden</option>
            <option value="meadow">Native Meadow Garden</option>
            <option value="woodland">Woodland Edge Garden</option>
            <option value="part-shade">Part Shade Flower Garden</option>
            <option value="rain-garden">Wet Soil / Rain Garden</option>
            <option value="low-maintenance">Low-Maintenance Native Garden</option>
            <option value="deer-resistant">Deer-Resistant Native Garden</option>
          </select>
        </div>

        <div class="form-element">
          <label for="pathway-selection">Infrastructure Path Type</label>
          <select id="pathway-selection" required>
            <option value="none" selected>No path through design</option>
            <option value="grass">Grass Path</option>
            <option value="woodchips">Woodchip Path</option>
            <option value="gravel">Gravel Path</option>
            <option value="pavers">Paver Path</option>
            <option value="dirt">Dirt Path</option>
          </select>
        </div>

        <div class="form-element">
          <label for="soil-type-selection">Substrate Soil Profile</label>
          <select id="soil-type-selection" required>
            <option value="rich-loam" selected>Rich Loam</option>
            <option value="sandy">Sandy / Fast Draining</option>
            <option value="slight-clay">Slightly Clay</option>
            <option value="heavy-clay">Heavy Clay</option>
            <option value="wet-soggy">Wet / Soggy</option>
            <option value="swampy">Swampy / Standing Water</option>
          </select>
        </div>

        <div class="dimensional-row-group">
          <div class="form-element compact">
            <label for="plot-width-input">Width (ft)</label>
            <input type="number" id="plot-width-input" min="4" max="40" value="10" required>
          </div>
          <div class="form-element compact">
            <label for="plot-length-input">Length (ft)</label>
            <input type="number" id="plot-length-input" min="4" max="40" value="10" required>
          </div>
        </div>

        <button type="submit" class="action-submit-btn" id="generate-blueprint-trigger">
          Design Your Garden Now
        </button>
      </form>

      <div id="sidebar-telemetry-output-mount"></div>

    </aside>

    <main class="workspace-canvas-area" id="app-design-viewport">
      <div id="canvas-rendering-target-wrapper">
        <div id="default-canvas-empty-prompt" class="canvas-empty-state">
          <div class="prompt-icon-graphic">📐</div>
          <h2>Ecosystem Canvas Blank</h2>
          <p>Configure your local site habitat parameters in the side control panel and select "Design Your Garden Now" to compile your custom botanical spatial layout blueprint.</p>
        </div>
      </div>
    </main>

  </div>

  <script src="render.js"></script>
  <script src="app.js"></script>
</body>
</html>
